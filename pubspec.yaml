name: studyflow
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.0.0
  google_sign_in: ^6.2.1

  

  # OTP UI
  pinput: ^5.0.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.1.0

  # Fonts
  google_fonts: ^6.3.1

  # Animations
  flutter_animate: ^4.5.2

  # SVG Support
  flutter_svg: ^2.2.0

  # Local Storage
  shared_preferences: ^2.5.3
  
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/